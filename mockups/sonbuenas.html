<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap">
<style>
*{margin:0;box-sizing:border-box;font-family:Arial}
body{background:#1A0F10;padding:18px;width:400px}
.felt{position:relative;height:150px;border:1px solid #3C2226;border-radius:18px;background:#2E191B;overflow:hidden;margin-bottom:12px;
  background-image:radial-gradient(120% 90% at 50% 0%,rgba(201,162,75,.08),transparent 60%)}
.tag{position:absolute;top:8px;left:12px;font-size:10px;color:#7C6460;text-transform:uppercase;letter-spacing:1px}
.wrap{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);padding:0 12px;text-align:center}
.card{margin:0 auto;max-width:256px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.65);
  backdrop-filter:blur(8px);border-radius:16px;padding:13px 20px;box-shadow:0 18px 38px -12px rgba(0,0,0,.7)}
.ey{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.35em;color:#C9A24B}
.big{font-family:'Sora';font-size:23px;font-weight:800;margin-top:5px}
.sub{font-size:14px;margin-top:6px}.sub b{color:#EFE6DA;font-weight:700}
.muted{color:rgba(239,230,218,.85)}.dash{color:#7C6460;margin:0 6px}
</style></head><body>
<div class="felt"><div class="tag">vos sos mano y ganás</div><div class="wrap"><div class="card">
  <div class="ey">Envido</div><div class="big" style="color:#46A574">Son buenas</div>
  <div class="sub" style="color:rgba(70,165,116,.9);font-weight:600">+2</div>
</div></div></div>

<div class="felt"><div class="tag">rival es mano y gana (vos perdés)</div><div class="wrap"><div class="card">
  <div class="ey">Real Envido</div><div class="big" style="color:#D2553B">Perdiste</div>
  <div class="sub muted">santib tiene <b>31</b></div>
</div></div></div>

<div class="felt"><div class="tag">ganás siendo pie (se revelan los dos)</div><div class="wrap"><div class="card">
  <div class="ey">Envido</div><div class="big" style="color:#46A574">¡Ganaste! +2</div>
  <div class="sub muted">vos <b>31</b><span class="dash">—</span><b>28</b> santib</div>
</div></div></div>

<div class="felt"><div class="tag">no quiero</div><div class="wrap"><div class="card">
  <div class="ey">Falta Envido</div><div class="big" style="color:#EFE6DA;font-size:19px">No quisieron</div>
  <div class="sub" style="color:#46A574;font-weight:600">+2 para vos</div>
</div></div></div>
</body></html>
