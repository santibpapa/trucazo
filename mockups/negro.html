<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>:root{
--bg:#15120E; --halo:rgba(201,162,75,.10); --halo2:rgba(201,162,75,.05);
--panel:#201B15; --line:#352C22; --cream:#EDE6D6; --muted:#9A8E7C;
--gold:#C9A24B; --gold-d:#8a6f2f; --ink-on-gold:#1A150F;
--shadow:0 6px 18px -8px rgba(0,0,0,.7); --shadow-gold:0 8px 18px -6px rgba(201,162,75,.35);}</style>
</head><body>
  <div class="title-strip">Negro cálido · carbón + oro</div>
  <header>
    <div class="brand">
      <div class="mark">&spades;</div>
      <div class="logo">Truc<b>azo</b></div>
    </div>
    <div class="balance"><span class="coin"></span><span class="tab">1.000</span></div>
  </header>
  <div class="cta-row">
    <div class="btn btn-primary">+ Crear mesa</div>
    <div class="btn btn-ghost">Unirse con código</div>
  </div>
  <div class="sec-head"><h2>Mesas disponibles</h2><span class="tab">3</span></div>
  <div class="table-list">
    <div class="row">
      <div><div class="name">La del campeón</div><div class="by">por santi</div></div>
      <div class="right"><div class="bet"><div class="lbl">Apuesta</div><div class="amt"><span class="coin"></span>120</div></div><div class="join">Unirse</div></div>
    </div>
    <div class="row">
      <div><div class="name">Truco hasta las 3</div><div class="by">por mariano</div></div>
      <div class="right"><div class="bet"><div class="lbl">Apuesta</div><div class="amt"><span class="coin"></span>50</div></div><div class="join">Unirse</div></div>
    </div>
    <div class="row">
      <div><div class="name">Mesa del barrio</div><div class="by">por flor</div></div>
      <div class="right"><div class="bet"><div class="lbl">Apuesta</div><div class="amt"><span class="coin"></span>300</div></div><div class="join">Unirse</div></div>
    </div>
  </div>
</body></html>
