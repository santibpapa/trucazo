<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap">
<style>
*{margin:0;box-sizing:border-box;font-family:Arial}
body{background:#1A0F10;padding:20px;width:390px}
.felt{position:relative;height:320px;border:1px solid #3C2226;border-radius:20px;background:#2E191B;overflow:hidden;
  background-image:radial-gradient(120% 90% at 50% 0%,rgba(201,162,75,.08),transparent 60%)}
.disp{font-family:'Sora',sans-serif}
.wrap{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);padding:0 12px;text-align:center}
.card{margin:0 auto;max-width:256px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.65);
  backdrop-filter:blur(8px);border-radius:16px;padding:14px 20px;box-shadow:0 18px 38px -12px rgba(0,0,0,.7)}
.ey{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.35em;color:#C9A24B}
.big{font-family:'Sora';font-size:24px;font-weight:800;color:#46A574;margin-top:5px}
.cmp{font-size:14px;color:rgba(239,230,218,.85);margin-top:6px}
.cmp b{color:#EFE6DA}.dash{color:#7C6460;margin:0 6px}
</style></head><body>
<div class="felt">
  <div class="wrap"><div class="card">
    <div class="ey">Envido</div>
    <div class="big">¡Ganaste! +2</div>
    <div class="cmp">vos <b>29</b><span class="dash">—</span><b>24</b> santib</div>
  </div></div>
</div>
<div style="height:14px"></div>
<div class="felt">
  <div class="wrap"><div class="card">
    <div class="ey">Envido</div>
    <div class="big" style="color:#D2553B">Ganó santib +2</div>
    <div class="cmp">vos <b>24</b><span class="dash">—</span><b>29</b> santib</div>
  </div></div>
</div>
</body></html>
